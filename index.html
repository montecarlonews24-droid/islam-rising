  <meta name="theme-color" content="#05070F"/>
  <meta name="application-name" content="Islam Rising"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="Islam Rising"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="description" content="Islam Rising — نبض العبادة اليومية"/>
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png"/>

  <title>Islam Rising</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body,#root{height:100%;background:#05070F;overflow-x:hidden}
    #splash{position:fixed;inset:0;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.6s ease}
    #splash.hide{opacity:0;pointer-events:none}
    #splash.gone{display:none}
    #err{display:none;position:fixed;inset:0;background:#05070F;color:#C9A96E;font-family:Georgia,serif;font-size:16px;align-items:center;justify-content:center;flex-direction:column;gap:12px;text-align:center;padding:30px;z-index:99999}
    #err.show{display:flex}
    @keyframes rotateSlow{to{transform:translateX(-50%) rotate(360deg)}}
    @keyframes floatStar{0%,100%{opacity:0.15}50%{opacity:0.32}}
    @keyframes orbPulse{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-12px)}}
    @keyframes dotP{0%,80%,100%{transform:scale(0.7);opacity:0.3}40%{transform:scale(1);opacity:1}}
    #splash h1{position:relative;z-index:1;font-family:Georgia,serif;font-size:26px;letter-spacing:8px;color:#C9A96E;margin-top:20px;text-transform:uppercase}
    #splash p{position:relative;z-index:1;font-family:Georgia,serif;font-size:13px;letter-spacing:4px;color:rgba(201,169,110,0.5);margin-top:6px}
    .dots{position:relative;z-index:1;display:flex;gap:8px;margin-top:24px}
    .dot{width:7px;height:7px;border-radius:50%;background:#C9A96E;opacity:0.3;animation:dotP 1.4s ease-in-out infinite}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  </style>
</head>

/* ── Prayer time calculation (simplified) ── */
function calcPrayerTimes(lat, lng, date = new Date(), tzOffset = null) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const D = date;
  const JD = Math.floor(365.25*(D.getFullYear()+4716)) + Math.floor(30.6001*(D.getMonth()+2)) + D.getDate() - 1524.5;
  const T  = (JD - 2451545) / 36525;
  const L0 = 280.46646 + 36000.76983*T;
  const M  = 357.52911 + 35999.05029*T;
  const C  = (1.914602-0.004817*T)*Math.sin(toRad(M)) + 0.019993*Math.sin(toRad(2*M));
  const sunLng = L0 + C;
  const e  = 23.439291 - 0.013004*T;
  const RA = toDeg(Math.atan2(Math.cos(toRad(e))*Math.sin(toRad(sunLng)), Math.cos(toRad(sunLng)))) / 15;
  const decl = toDeg(Math.asin(Math.sin(toRad(e))*Math.sin(toRad(sunLng))));
  const EqT = 4*(L0 - 0.0057183 - RA*15 + 360*(Math.floor((L0-RA*15)/360)));
  const noon = 12 - EqT/60 - lng/15;
  const ha = a => toDeg(Math.acos((Math.sin(toRad(a)) - Math.sin(toRad(lat))*Math.sin(toRad(decl))) / (Math.cos(toRad(lat))*Math.cos(toRad(decl))))) / 15;
  const asrShadow = 1 + Math.tan(toRad(Math.abs(lat - decl)));
  const asrAngle = toDeg(Math.atan(1/asrShadow));
  const fmt = h => {
    const tz = tzOffset !== null ? tzOffset : -date.getTimezoneOffset()/60;
    const local = h + tz;
    const hh = Math.floor(((local % 24)+24)%24);
    const mm = Math.floor((local-Math.floor(local))*60);
    return `${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}`;
  };
  try {
    return {
      fajr:    fmt(noon - ha(-18)),
      sunrise: fmt(noon - ha(-0.833)),
      dhuhr:   fmt(noon + 0.03),
      asr:     fmt(noon + ha(asrAngle)),
      maghrib: fmt(noon + ha(-0.833)),
      isha:    fmt(noon + ha(-17)),
    };
  } catch { return null; }
}

/* ── Qibla bearing ── */
function qiblaBearing(lat, lng) {
  const mLat = 21.4225, mLng = 39.8262;
  const dLng = toRad(mLng - lng);
  const y = Math.sin(dLng) * Math.cos(toRad(mLat));
  const x = Math.cos(toRad(lat))*Math.sin(toRad(mLat)) - Math.sin(toRad(lat))*Math.cos(toRad(mLat))*Math.cos(dLng);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}
function toRad(d){ return d*Math.PI/180; }
function toDeg(r){ return r*180/Math.PI; }

          {tab===2 && (
            <div key="lb" style={{animation:"floatUp 0.3s ease"}}>
              <div style={{fontSize:11,color:"var(--muted)",letterSpacing:3,marginBottom:14,textAlign:"center"}}>
                ✦ لوحة المتصدرين ✦
              </div>

              {isFriday && (
                <div style={{borderRadius:16,padding:"12px 16px",marginBottom:14,
                  background:"linear-gradient(135deg,rgba(255,200,0,0.14),rgba(201,169,110,0.06))",
                  border:"1px solid rgba(255,200,0,0.35)",display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:24}}>✨</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"#FFD700"}}>جمعة مباركة — النقاط مضاعفة</div>
                    <div style={{fontSize:11,color:"rgba(255,200,0,0.65)"}}>× {MULT} على كل عبادة اليوم</div>
                  </div>
                </div>
              )}

              {/* Period tabs */}
              <div style={{display:"flex",background:"rgba(255,255,255,0.04)",
                border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:4,gap:3,marginBottom:14}}>
                {[{k:"daily",ar:"اليوم"},{k:"weekly",ar:"الأسبوع"},{k:"monthly",ar:"الشهر"}].map(p=>(
                  <button key={p.k} className="btn" onClick={()=>setPeriod(p.k)} style={{
                    flex:1,padding:"9px",border:"none",cursor:"pointer",borderRadius:10,
                    fontSize:13,fontWeight:700,fontFamily:"Noto Naskh Arabic",
                    background:period===p.k?"linear-gradient(135deg,#C9A96E,#F0D898)":"transparent",
                    color:period===p.k?"#05070F":"var(--muted)",
                    boxShadow:period===p.k?"0 3px 12px rgba(201,169,110,0.38)":"none",
                    transition:"all 0.3s cubic-bezier(0.34,1.56,0.64,1)"}}>
                    {p.ar}
                  </button>
                ))}
              </div>

              {/* My card */}
              {myName && current.find(e=>e.name===myName) ? (
                <div style={{borderRadius:18,padding:"14px 18px",marginBottom:14,
                  background:"linear-gradient(135deg,rgba(201,169,110,0.12),rgba(201,169,110,0.04))",
                  border:"1px solid rgba(201,169,110,0.38)",display:"flex",alignItems:"center",gap:14,
                  boxShadow:"0 6px 24px rgba(201,169,110,0.12)"}}>
                  <div style={{width:48,height:48,borderRadius:"50%",flexShrink:0,
                    background:"linear-gradient(135deg,#C9A96E,#F0D898)",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:myRank<=3?20:15,fontWeight:900,color:"#05070F",
                    boxShadow:"0 4px 14px rgba(201,169,110,0.45)"}}>
                    {myRank<=3?MEDALS[myRank-1]:`#${myRank}`}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:700,color:"white"}}>{myName}{isPremium&&" 👑"}</div>
                    <div style={{fontSize:11,color:"var(--gold3)",marginTop:2}}>
                      {RANKS[Math.min(Math.floor(pts/200),RANKS.length-1)]}
                    </div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <div className="gold-text" style={{fontSize:22,fontWeight:900,lineHeight:1}}>{pts}</div>
                    <div style={{fontSize:9,color:"var(--muted)",marginTop:1}}>نقطة</div>
                  </div>
                </div>
              ) : !myName && (
                <div style={{borderRadius:18,padding:"20px",marginBottom:14,
                  background:"rgba(255,255,255,0.03)",border:"1px solid rgba(201,169,110,0.18)",textAlign:"center"}}>
                  <div style={{fontSize:24,marginBottom:8}}>🏆</div>
                  <div style={{fontSize:14,fontWeight:700,color:"white",marginBottom:6}}>انضم للمتصدرين</div>
                  <div style={{display:"flex",gap:10,marginTop:14}}>
                    <input value={nameIn} onChange={e=>setNameIn(e.target.value)}
                      onKeyDown={e=>e.key==="Enter"&&joinBoard()}
                      placeholder="اسمك أو لقبك..."
                      style={{flex:1,padding:"11px 14px",borderRadius:11,
                        border:"1px solid rgba(201,169,110,0.22)",background:"rgba(255,255,255,0.04)",
                        color:"white",fontSize:14,fontFamily:"Noto Naskh Arabic",direction:"rtl",outline:"none"}}/>
                    <button className="btn" onClick={joinBoard} disabled={saving||!nameIn.trim()} style={{
                      padding:"11px 16px",borderRadius:11,border:"none",
                      background:nameIn.trim()?"linear-gradient(135deg,#C9A96E,#F0D898)":"rgba(255,255,255,0.05)",
                      color:nameIn.trim()?"#05070F":"var(--muted)",fontWeight:700,fontSize:14,
                      fontFamily:"Noto Naskh Arabic",cursor:"pointer",whiteSpace:"nowrap",
                      boxShadow:nameIn.trim()?"0 4px 14px rgba(201,169,110,0.38)":"none"}}>
                      {saving?"...":"انضم ✦"}
                    </button>
                  </div>
                </div>
              )}

              {/* Board */}
              {bLoading ? (
                <div style={{textAlign:"center",padding:"36px 0",color:"var(--muted)"}}>
                  <div style={{fontSize:26,marginBottom:8,animation:"floatUp 1s infinite"}}>⏳</div>
                  جاري التحميل...
                </div>
              ) : current.length===0 ? (
                <div style={{textAlign:"center",padding:"36px 0",color:"var(--muted)"}}>
                  <div style={{fontSize:32,marginBottom:8}}>🌟</div>
                  كن أول المتصدرين!
                </div>
              ) : (
                <>
                  {/* Podium */}
                  {current.length>=3 && (
                    <div style={{display:"flex",alignItems:"flex-end",gap:6,marginBottom:16,padding:"0 4px"}}>
                      {[current[1],current[0],current[2]].map((e,i)=>{
                        const H=[108,140,90][i];
                        const grads=[
                          "linear-gradient(180deg,#B0B8C8,#8A9AAA)",
                          "linear-gradient(180deg,#F0D060,#C9A96E)",
                          "linear-gradient(180deg,#C08040,#8A5A20)"
                        ][i];
                        const glows=["rgba(176,184,200,0.3)","rgba(201,169,110,0.5)","rgba(192,128,64,0.3)"][i];
                        const isMe=e?.name===myName;
                        return (
                          <div key={i} style={{flex:1,textAlign:"center"}}>
                            <div style={{fontSize:11,color:isMe?"var(--gold)":"var(--muted)",marginBottom:3,
                              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"0 2px"}}>
                              {e?.name||"—"}{e?.premium?" 👑":""}
                            </div>
                            <div style={{fontSize:10,color:"rgba(255,255,255,0.38)",marginBottom:5}}>{e?.pts||0}</div>
                            <div style={{height:H,borderRadius:"10px 10px 0 0",background:grads,
                              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",
                              paddingTop:10,boxShadow:`0 -5px 20px ${glows}`,
                              border:isMe?"2px solid rgba(201,169,110,0.85)":"none"}}>
                              <div style={{fontSize:22}}>{["🥈","🥇","🥉"][i]}</div>
                              <div style={{fontSize:11,fontWeight:900,marginTop:4,color:i===1?"#05070F":"rgba(0,0,0,0.65)"}}>
                                #{[2,1,3][i]}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {current.map((e,i)=>{
                    const isMe=e.name===myName, isTop=i<3;
                    const ago=Math.round((Date.now()-(e.ts||0))/60000);
                    const agoStr=ago<60?`${ago}د`:ago<1440?`${Math.round(ago/60)}س`:`${Math.round(ago/1440)}ي`;
                    return (
                      <div key={i} style={{borderRadius:14,padding:"11px 14px",marginBottom:7,
                        background:isMe?"linear-gradient(135deg,rgba(201,169,110,0.12),rgba(201,169,110,0.04))":"rgba(255,255,255,0.03)",
                        border:isMe?"1px solid rgba(201,169,110,0.4)":isTop?"1px solid rgba(255,255,255,0.08)":"1px solid rgba(255,255,255,0.04)",
                        display:"flex",alignItems:"center",gap:11,
                        animation:`slideIn ${0.15+i*0.035}s ease`,
                        boxShadow:isMe?"0 4px 16px rgba(201,169,110,0.1)":"none"}}>
                        <div style={{width:33,height:33,borderRadius:"50%",flexShrink:0,
                          background:isTop?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.03)",
                          display:"flex",alignItems:"center",justifyContent:"center",
                          fontSize:i<3?16:11,fontWeight:700,color:isMe?"var(--gold)":isTop?"white":"var(--muted)"}}>
                          {i<3?MEDALS[i]:i+1}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:isMe?"var(--gold)":"white",marginBottom:2,
                            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                            {e.name}{isMe&&" (أنت)"}{e.premium&&" 👑"}
                          </div>
                          <div style={{fontSize:10,color:"var(--muted)"}}>🔥{e.streak||0} · {e.title} · منذ {agoStr}</div>
                        </div>
                        <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"5px 10px",textAlign:"center",flexShrink:0}}>
                          <div style={{fontSize:14,fontWeight:900,color:isMe?"var(--gold)":isTop?"white":"rgba(255,255,255,0.65)"}}>{e.pts}</div>
                          <div style={{fontSize:9,color:"var(--muted)"}}>نقطة</div>
                        </div>
                      </div>
                    );
                  })}
                  <button className="btn" onClick={loadBoard} style={{width:"100%",marginTop:6,padding:"10px",
                    borderRadius:12,border:"1px solid rgba(255,255,255,0.07)",background:"transparent",
                    color:"var(--muted)",fontSize:12,cursor:"pointer",fontFamily:"Noto Naskh Arabic"}}>
                    ↻ تحديث
                  </button>
                </>
              )}
            </div>
          )}

          {/* ════ SENTINEL AI ════ */}
          {tab===3 && (
            <div key="ai" style={{animation:"floatUp 0.3s ease"}}>
              {/* Header */}
              <div style={{textAlign:"center",marginBottom:16}}>
                <div style={{fontSize:10,letterSpacing:4,color:"var(--gold3)",marginBottom:6}}>✦ SENTINEL AI ✦</div>
                <div style={{fontSize:13,color:"var(--muted)"}}>
                  اسألني عن الفقه، العبادات، السيرة والأذكار
                </div>
                {!isPremium && (
                  <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:8}}>
                    <div style={{fontSize:11,color:"rgba(123,94,167,0.8)"}}>
                      {3-aiMsgs.filter(m=>m.role==="user").length} سؤال مجاني متبقي
                    </div>
                    <button className="btn" onClick={()=>setPremModal(true)} style={{
                      padding:"4px 12px",borderRadius:8,border:"none",
                      background:"linear-gradient(135deg,#7B5EA7,#9B7EC7)",
                      color:"white",fontSize:11,fontWeight:700,cursor:"pointer",
                      fontFamily:"Noto Naskh Arabic"}}>
                      👑 Premium
                    </button>
                  </div>
                )}
              </div>

              {/* Chat */}
              <div ref={aiRef} style={{
                height:380,overflowY:"auto",borderRadius:18,padding:"14px",
                background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",
                marginBottom:12,display:"flex",flexDirection:"column",gap:10
              }}>
                {aiMsgs.map((m,i)=>(
                  <div key={i} style={{
                    display:"flex",justifyContent:m.role==="user"?"flex-start":"flex-end",
                    animation:"msgIn 0.3s ease"
                  }}>
                    <div style={{
                      maxWidth:"82%",padding:"10px 14px",borderRadius:16,
                      borderBottomRightRadius:m.role==="user"?4:16,
                      borderBottomLeftRadius:m.role==="user"?16:4,
                      background:m.role==="user"
                        ?"linear-gradient(135deg,rgba(201,169,110,0.18),rgba(201,169,110,0.08))"
                        :"rgba(255,255,255,0.06)",
                      border:m.role==="user"
                        ?"1px solid rgba(201,169,110,0.25)"
                        :"1px solid rgba(255,255,255,0.08)",
                      fontSize:14,lineHeight:1.7,color:"white",
                      whiteSpace:"pre-wrap",direction:"rtl",textAlign:"right"
                    }}>
                      {m.text}
                    </div>
                  </div>
                ))}
                {aiLoading && (
                  <div style={{display:"flex",justifyContent:"flex-end"}}>
                    <div style={{padding:"12px 16px",borderRadius:16,
                      background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",
                      display:"flex",gap:5,alignItems:"center"}}>
                      {[0,0.2,0.4].map((d,i)=>(
                        <div key={i} style={{width:6,height:6,borderRadius:"50%",background:"var(--gold)",
                          animation:`thinking 1.2s ${d}s ease-in-out infinite`}}/>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              {/* Input */}
              <div style={{display:"flex",gap:10}}>
                <textarea
                  value={aiInput}
                  onChange={e=>setAiInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),sendAI())}
                  placeholder="اكتب سؤالك هنا..."
                  rows={2}
                  style={{
                    flex:1,padding:"11px 14px",borderRadius:14,resize:"none",
                    border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",
                    color:"white",fontSize:14,fontFamily:"Noto Naskh Arabic",
                    direction:"rtl",transition:"border 0.2s",lineHeight:1.5
                  }}
                />
                <button className="btn" onClick={sendAI} disabled={aiLoading||!aiInput.trim()} style={{
                  width:50,borderRadius:14,border:"none",
                  background:aiInput.trim()?"linear-gradient(135deg,#C9A96E,#F0D898)":"rgba(255,255,255,0.05)",
                  color:aiInput.trim()?"#05070F":"var(--muted)",
                  fontSize:20,cursor:aiInput.trim()?"pointer":"default",
                  flexShrink:0,
                  boxShadow:aiInput.trim()?"0 4px 14px rgba(201,169,110,0.38)":"none",
                  transition:"all 0.2s"}}>
                  ➤
                </button>
              </div>

              {/* Quick questions */}
              <div style={{marginTop:12,display:"flex",flexWrap:"wrap",gap:8}}>
                {["ما حكم صلاة الجماعة؟","أذكار الصباح","فضل يوم الجمعة","دعاء قبل النوم"].map((q,i)=>(
                  <button key={i} className="btn" onClick={()=>{ setAiInput(q); }} style={{
                    padding:"7px 14px",borderRadius:99,border:"1px solid rgba(201,169,110,0.22)",
                    background:"rgba(201,169,110,0.06)",color:"var(--gold)",
                    fontSize:12,cursor:"pointer",fontFamily:"Noto Naskh Arabic",
                    transition:"all 0.2s"}}>
                    {q}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>

        <div style={{position:"fixed",bottom:0,left:0,right:0,height:90,
          background:"linear-gradient(transparent,rgba(5,7,15,0.98))",
          pointerEvents:"none",zIndex:5}}/>
      </div>
    </>
  );
}


/* ── Mount to DOM ── */
const _root = document.getElementById('root');
if (_root && !_root._reactRootContainer) {
  ReactDOM.createRoot(_root).render(React.createElement(App));
  if (window.__removeSplash) window.__removeSplash();
}

</script>

</body>
</html>
